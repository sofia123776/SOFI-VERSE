{% extends 'base.html' %}

{% block title %}Order Successful{% endblock %}

{% block content %}

<div class="container py-5 text-center">

    <div class="card shadow border-0 rounded-4 p-5">

        <h1 class="text-success">
            🎉 Thank You!
        </h1>

        <h3 class="mt-3">

            Your order has been placed successfully.

        </h3>

        <p class="mt-3">

            Order Number:
            <strong>#{{ order.id }}</strong>

        </p>

        <a href="{% url 'home' %}"
           class="btn btn-sofi mt-4">

            Continue Shopping

        </a>

    </div>

</div>

{% endblock %}
