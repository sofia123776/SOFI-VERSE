{% extends 'base.html' %}

{% block title %}
Contact Us
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="text-center mb-5">

        <h1 class="fw-bold">
            Contact Us
        </h1>

        <p class="lead">
            We'd love to hear from you.
        </p>

    </div>

    <div class="row">

        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4 p-4">

                <h3 class="text-success mb-4">
                    Get In Touch
                </h3>

                <form>

                    <div class="mb-3">

                        <label>Name</label>

                        <input
                            type="text"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Email</label>

                        <input
                            type="email"
                            class="form-control">

                    </div>

                    <div class="mb-3">

                        <label>Message</label>

                        <textarea
                            rows="5"
                            class="form-control"></textarea>

                    </div>

                    <button class="btn btn-success">

                        Send Message

                    </button>

                </form>

            </div>

        </div>

        <div class="col-lg-6">

            <div class="card shadow border-0 rounded-4 p-4 h-100">

                <h3 class="text-success">

                    Contact Information

                </h3>

                <hr>

                <p>
                    📍 Nairobi, Kenya
                </p>

                <p>
                    📞 +254 743 732 058
                </p>

                <p>
                    📧 sofiahafsa00@gmail.com
                </p>

                <hr>

                <h5>

                    Business Hours

                </h5>

                <p>

                    Monday - Friday<br>

                    8:00 AM - 6:00 PM

                </p>

            </div>

        </div>

    </div>

</div>

{% endblock %}
